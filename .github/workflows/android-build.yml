name: Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install required SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" --sdk_root=$ANDROID_HOME || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Verify wrapper
        run: |
          ls -la gradlew gradlew.bat gradle/wrapper/
          file gradlew
          head -5 gradlew
          java -jar gradle/wrapper/gradle-wrapper.jar --version || echo "Wrapper JAR failed"

      - name: Build with Gradle
        id: gradle_build
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee gradle_output.txt

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: gradle_output.txt

      - name: Check build status
        if: steps.gradle_build.outcome != 'success'
        run: |
          echo "Build failed - checking logs..."
          cat gradle_output.txt | tail -50

      - name: Upload APK
        if: steps.gradle_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
